global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: docker-compose

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: rag-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["rag-service:8080"]

  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]

  - job_name: alloy
    static_configs:
      - targets: ["alloy:12345"]

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]

remote_write: []
