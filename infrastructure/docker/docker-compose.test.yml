services:

  # ── Trace generators ─────────────────────────────────────────────────────
  tracegen:
    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:latest
    container_name: rag-tracegen
    restart: unless-stopped
    command:
      - traces
      - --otlp-endpoint=tempo:4317
      - --otlp-insecure
      - --duration=inf
      - --rate=5
      - --otlp-attributes=service.name="test-tracegen"
      - --otlp-attributes=deployment.environment="docker-test"
      - --service=test-service-alpha
      - --child-spans=3
      - --status-code=Unset
    networks:
      - rag-network

  tracegen-errors:
    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:latest
    container_name: rag-tracegen-errors
    restart: unless-stopped
    command:
      - traces
      - --otlp-endpoint=tempo:4317
      - --otlp-insecure
      - --duration=inf
      - --rate=1
      - --otlp-attributes=service.name="test-tracegen-errors"
      - --service=test-service-beta
      - --child-spans=2
      - --status-code=Error
    networks:
      - rag-network

  # ── Log generators ────────────────────────────────────────────────────────
  loggen:
    image: mingrammer/flog:latest
    container_name: rag-loggen-json
    restart: unless-stopped
    command:
      - --loop
      - --format=json
      - --number=1
      - --delay=500ms
      - --bytes=0
      - --type=log
      - --output=/dev/stdout
      - --overwrite
    labels:
      logging: "true"
    networks:
      - rag-network

  loggen-apache:
    image: mingrammer/flog:latest
    container_name: rag-loggen-apache
    restart: unless-stopped
    command:
      - --loop
      - --format=apache_common
      - --number=1
      - --delay=1s
      - --bytes=0
      - --type=log
      - --output=/dev/stdout
      - --overwrite
    labels:
      logging: "true"
    networks:
      - rag-network

  # ── Vulture (Tempo health probe) ──────────────────────────────────────────
  vulture:
    image: grafana/tempo-vulture:2.10.0
    container_name: rag-vulture
    restart: unless-stopped
    command:
      - -prometheus-listen-address=:8080
      - -tempo-query-url=http://tempo:3200
      - -tempo-push-url=http://tempo:4317
    networks:
      - rag-network

networks:
  rag-network:
    name: rag-network
    external: true
