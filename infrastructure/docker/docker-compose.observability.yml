services:

  # ── Tempo (Distributed Tracing) ───────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.10.0
    container_name: rag-tempo
    restart: unless-stopped
    depends_on:
      obs-createbuckets:
        condition: service_completed_successfully
    command:
      - "-target=all"
      - "-config.file=/etc/tempo.yaml"
      - "-config.expand-env=true"
    volumes:
      - ./infrastructure/config/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    environment:
      MINIO_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin12345}
      MINIO_BUCKET: ${TEMPO_BUCKET:-tempo}
    networks:
      - rag-network

  # ── Loki (Log Aggregation) ────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.5.10
    container_name: rag-loki
    restart: unless-stopped
    user: root
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./infrastructure/config/loki.yaml:/etc/loki/loki.yaml:ro
      - loki_data:/var/loki
    ports:
      - "3100:3100"
    networks:
      - rag-network

  # ── Minio — create Tempo bucket ───────────────────────────────────────────
  obs-createbuckets:
    image: minio/mc:latest
    container_name: rag-obs-minio-init
    restart: "no"
    environment:
      MINIO_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin12345}
      MINIO_BUCKET: ${TEMPO_BUCKET:-tempo}
    entrypoint:
      - sh
      - -euc
      - |
        until mc alias set local http://minio:9000 $$MINIO_USER $$MINIO_PASSWORD; do
          echo "Waiting for MinIO..."; sleep 2;
        done
        mc mb --ignore-existing local/$$MINIO_BUCKET
        echo "Bucket $$MINIO_BUCKET ready"
    networks:
      - rag-network

  # ── Grafana Alloy (Telemetry Collector) ───────────────────────────────────
  alloy:
    image: grafana/alloy:v1.13.1
    container_name: rag-alloy
    restart: unless-stopped
    volumes:
      - ./infrastructure/config/alloy.alloy:/etc/alloy/config.alloy:ro
      - alloy_data:/var/lib/alloy/data
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
    environment:
      ALLOY_OTLP_UPSTREAM: tempo:4317
    ports:
      - "12345:12345"
      - "4319:4317"
      - "4320:4318"
    depends_on:
      - tempo
      - loki
    networks:
      - rag-network

  # ── Prometheus (Metrics) ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.9.1
    container_name: rag-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus.yaml
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
      - --enable-feature=native-histograms
    volumes:
      - ./infrastructure/config/prometheus.yaml:/etc/prometheus.yaml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - rag-network

  # ── Grafana (Dashboards) ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:12.3.3
    container_name: rag-grafana
    restart: unless-stopped
    volumes:
      - ./infrastructure/config/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor metricsSummary
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - rag-network

networks:
  rag-network:
    name: rag-network
    external: true

volumes:
  tempo_data:
  loki_data:
  alloy_data:
  prometheus_data:
  grafana_data:
