server:
  port: 8080 # Порт твоего приложения

spring:

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: chat-ai-group
      auto-offset-reset: earliest # чтобы читать при падении все, что было в топике
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    properties:
      spring.json.trusted.packages: "*"
      spring.json.ignored-type-headers: false

  application:
    name: rag-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/rag_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver



  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect


  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/rag-realm
          jwk-set-uri: http://localhost:8081/realms/rag-realm/protocol/openid-connect/certs




minio:
  url: http://localhost:9000
  access-key: admin
  secret-key: admin12345
  bucket-name: rag-documents


rag:
  retrieval:
    # Сколько чанков брать для контекста по умолчанию
    default-top-k: 5
    # Минимальный cosine similarity score (0.0 = без фильтра, 0.7 = строгий)
    similarity-threshold: 0.7
    # Максимальная длина секции (символов), при которой берём её целиком вместо чанка
    # (паттерн Parent Document Retrieval)
    max-section-length-for-full-context: 2000
    # Константа сглаживания для Reciprocal Rank Fusion (при гибридном поиске)
    rrf-k: 60
    # Включить reranking после RRF (требует подключения reranker-сервиса)
    reranking-enabled: false

  llm:
    # Максимальный размер контекста (символов), отправляемого в LLM - тут надо остановиться и узнать о конкретной модели, какой у нее контекст
    # Не передавать больше — модель может игнорировать или обрезать
    max-context-length: 8000

  conversation:
    # Максимальное количество сообщений истории в промпте
    max-history-messages: 10
    # Максимальное количество токенов истории (1 токен ≈ 4 символа)
    max-history-tokens: 3000

  elasticsearch:
    # Имя индекса в Elasticsearch (для гибридного поиска)
    index-name: rag-chunks
    # Адрес ES (нужен только при включённом hybrid search)
    host: localhost
    port: 9200




logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    # RAG pipeline — включить DEBUG для детальной трассировки
    ai.chat.service.retrieval: INFO
    ai.chat.service.rag: INFO
    ai.chat.service.logging: DEBUG